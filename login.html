<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa - THHKtiv</title>
    
    <!-- Google Fonts: Quicksand -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="data_siswa.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="container login-container">
        <header>
            <div class="hero-illustration">
                <img src="karakter_siswa_indonesia_ceria.png" alt="Karakter Siswa Indonesia" class="student-img">
            </div>
            <h1 style="text-align: center; color: #0f766e; font-weight: 800; font-size: 1.8rem; margin-top: -10px; margin-bottom: 25px; letter-spacing: 1px;">SMP THHKtiv</h1>
            <h1 class="cartoon-title">Halo Sahabat!</h1>
            <p>Silakan masuk untuk mencatat kebiasaan hebatmu.</p>
        </header>

        <form id="login-form">
            <div class="form-group">
                <label for="student-id">ID Siswa (Contoh: 08-001)</label>
                <div class="input-with-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="student-id" placeholder="Masukkan ID kamu..." required>
                </div>
            </div>

            <div class="form-group">
                <label for="student-pin">PIN Keamanan</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="student-pin" placeholder="Masukkan 4 digit PIN..." maxlength="4" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    Masuk Sekarang <i class="fas fa-sign-in-alt"></i>
                </button>
            </div>
            
            <p class="login-footer">Belum punya akun? Hubungi Bapak/Ibu Guru ya!</p>
            
            <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #cbd5e1;">
                <a href="dashboard.html" style="color: #0d9488; font-weight: 700; font-size: 0.9rem; text-decoration: none;">
                    <i class="fas fa-chalkboard-teacher"></i> Akses Dasbor Guru
                </a>
            </div>
        </form>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = "https://czqkvzamhpbkqmktiach.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cWt2emFtaHBia3Fta3RpYWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzgyNTgsImV4cCI6MjA5MjkxNDI1OH0.N1ic3C4LsTFe1X3tXd_pf3L047dBqygG5cZHyZ769bs";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idInput = document.getElementById('student-id').value.trim();
            const pin = document.getElementById('student-pin').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Cari siswa berdasarkan ID
            const student = window.STUDENT_DATA.find(s => s.id === idInput);

            if (student) {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa...';
                submitBtn.disabled = true;

                try {
                    // Cek pin khusus di Supabase
                    const { data, error } = await supabaseClient
                        .from('student_pins')
                        .select('pin')
                        .eq('student_id', idInput);

                    let correctPin = "1234"; // PIN default
                    
                    // Jika ada data PIN khusus untuk anak ini di Supabase, gunakan itu
                    if (data && data.length > 0) {
                        correctPin = data[0].pin;
                    }

                    if (pin === correctPin) {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('studentID', student.id);
                        localStorage.setItem('studentName', student.nama);
                        
                        alert('Selamat datang, ' + student.nama + '! Yuk catat kebiasaanmu.');
                        window.location.href = 'index.html';
                    } else {
                        alert('PIN salah. Coba lagi ya! (Jika belum diganti, PIN default adalah 1234)');
                    }
                } catch (err) {
                    console.error(err);
                    alert("Gangguan koneksi saat mengecek PIN. Silakan coba lagi.");
                } finally {
                    submitBtn.innerHTML = 'Masuk Sekarang <i class="fas fa-sign-in-alt"></i>';
                    submitBtn.disabled = false;
                }
            } else {
                alert('ID Siswa tidak ditemukan. Pastikan formatnya benar (Contoh: 08-001)');
            }
        });

        // Cek jika sudah login
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
